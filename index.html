<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

   <!-- HEADER / NAVIGATION -->
<header class="sticky top-0 z-40 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 px-4 py-4 md:px-8">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
        
        <!-- CREATIVE GAMING LOGO (GAMEVAULT CONCEPT) -->
        <div class="text-2xl font-black tracking-wider text-white flex items-center gap-3 select-none group cursor-pointer">
            <!-- Modern Shield/Vault & Wings Container -->
            <div class="relative flex items-center justify-center w-11 h-11 rounded-xl bg-gradient-to-br from-indigo-600/20 to-slate-800 border border-indigo-500/30 group-hover:border-indigo-500/70 transition-all duration-300 shadow-lg shadow-indigo-500/5 group-hover:shadow-indigo-500/20">
                
                <!-- Left Wing (Effet Modern/Gamer) -->
                <i class="fa-solid fa-feather-pointed absolute -left-2 text-indigo-400/40 text-xs -scale-x-100 rotate-12 group-hover:-left-2.5 group-hover:text-indigo-400 transition-all duration-300"></i>
                
                <!-- Center Vault Shield -->
                <i class="fa-solid fa-shield text-indigo-500 text-xl group-hover:scale-110 transition-transform duration-300"></i>
                
                <!-- Embedded Mini Gamepad -->
                <i class="fa-solid fa-gamepad text-white text-[10px] absolute inset-auto z-10 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]"></i>
                
                <!-- Right Wing (Effet Modern/Gamer) -->
                <i class="fa-solid fa-feather-pointed absolute -right-2 text-indigo-400/40 text-xs -rotate-12 group-hover:-right-2.5 group-hover:text-indigo-400 transition-all duration-300"></i>
                
                <!-- Tiny Lock/Vault Indicator -->
                <span class="absolute -bottom-1 -right-1 bg-indigo-500 text-[8px] text-slate-950 w-3.5 h-3.5 rounded-full flex items-center justify-center border border-slate-900 font-bold">
                    <i class="fa-solid fa-lock text-[7px]"></i>
                </span>
            </div>
            
            <!-- Typography with Interactive Glow -->
            <span class="tracking-widest">
                GAME<span class="text-indigo-500 drop-shadow-[0_0_8px_rgba(99,102,241,0.5)] group-hover:text-indigo-400 transition-colors duration-300">VAULT</span>
            </span>
        </div>

        <!-- SEARCH INPUT (Unchanged Colors) -->
        <div class="relative w-full sm:w-72 lg:w-96">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input id="search_input" type="text" placeholder="Rechercher un jeu d'élite..." 
                   class="w-full bg-slate-800 text-white placeholder-slate-500 pl-10 pr-4 py-2.5 rounded-xl border border-slate-700 outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all duration-300 text-sm">
        </div>

        <!-- CART BUTTON (Unchanged Colors) -->
        <div>
            <button id="startCard" class="bg-slate-800 hover:bg-slate-700 text-white border border-slate-700 font-bold py-2.5 px-5 rounded-xl flex items-center gap-3 transition-all duration-300 transform active:scale-95 group">
                <i class="fa-solid fa-cart-shopping text-indigo-400 group-hover:animate-bounce"></i> 
                <span>Panier</span>
            </button>
        </div>
    </div>
</header>

    <!-- MAIN CONTAINER -->
    <main class="max-w-7xl mx-auto px-4 py-8 md:py-12 space-y-10">
        
        <!-- FILTRES -->
        <div class="flex flex-wrap gap-3 justify-center items-center bg-slate-900 border border-slate-800 p-3 rounded-2xl max-w-3xl mx-auto">
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-wide uppercase transition-all duration-300 bg-indigo-600 text-white border border-indigo-600 shadow-lg shadow-indigo-600/20" data-genre="All">
                Tout
            </button>
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-wide uppercase transition-all duration-300 bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:border-slate-500" data-genre="Action">
                Action
            </button>
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-wide uppercase transition-all duration-300 bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:border-slate-500" data-genre="RPG">
                RPG
            </button>
            <!-- Correction hna : Trj3 data-genre="Sport" f blast "FPS" -->
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-wide uppercase transition-all duration-300 bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:border-slate-500" data-genre="Sport">
                MMORPG
            </button>
            <!-- Zdna l-bouton dial les jeux de Course jdad -->
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-bold tracking-wide uppercase transition-all duration-300 bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:border-slate-500" data-genre="Course">
                Shooter
            </button>
        </div>

        <!-- GRID DES JEUX -->
        <section>
            <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"> </div>
        </section>

    </main>

    <!-- SIDE PANIER -->
    <div id="listCard" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-slate-900 shadow-2xl border-l border-slate-800 z-50 transform translate-x-full transition-transform duration-300 ease-in-out p-6 flex flex-col justify-between">
        
        <div>
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                <h2 class="text-xl font-black text-white tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-basket-shopping text-indigo-500"></i> VOTRE PANIER
                </h2>
                <button id="closeCart" class="text-slate-400 hover:text-white bg-slate-800 hover:bg-red-500/20 w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-300 text-lg">&times;</button>
            </div>

            <div id="cart-items-list" class="space-y-4 max-h-[65vh] overflow-y-auto pr-1"> </div>
        </div>

        <div class="border-t border-slate-800 pt-4 mt-auto">
            <div class="flex justify-between items-center text-lg font-bold text-white mb-5">
                <span class="text-slate-400 font-medium">Montant Total:</span>
                <span id="cart-total" class="text-2xl font-black text-indigo-400 tracking-tight">0 $</span>
            </div>
            
            <button id="BtnCommande" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl transition-all duration-300 shadow-lg shadow-indigo-600/10 hover:shadow-indigo-600/20 flex items-center justify-center gap-2 transform active:scale-[0.98]">
                <i class="fa-solid fa-credit-card"></i> Passer la commande
            </button>
        </div>
    </div>

    <!-- OVERLAY BACKGROUND -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/70 hidden z-40 transition-opacity duration-300"></div>

    <!-- TOAST NOTIFICATIONS CONTAINER -->
    <div id="toast-container" class="fixed top-24 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
